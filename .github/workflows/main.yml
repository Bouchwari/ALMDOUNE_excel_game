name: EAS Build (Cloud)

on:
  # Manual only — EAS builds cost credits, don't burn them on every push
  workflow_dispatch:

jobs:
  build:
    name: EAS Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # cache disabled — avoids intermittent 400 from GitHub cache service

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS (preview profile)
        run: eas build --platform android --profile preview --non-interactive
